<!DOCTYPE html>
<html>

<head>
  <title>Dashboard</title>

  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/pages.css">
</head>

<body>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <ul>
        <li class="active">Dashboard</li>
        <li>Appointment</li>
        <li>Analytics</li>
        <li>Doctor</li>
        <li>Report</li>
        <li>History</li>
      </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

      <div class="header">Clinic Administrator System</div>

      <!-- REPORT -->
      <div class="card">
        <h2>Reports</h2>

        <div class="report">
          <div>
            <b>1. Anuman Begum</b>
            <p>Diagnosis - Thyroid Prediction</p>
          </div>
          <span class="badge red">67%</span>
        </div>

        <div class="report">
          <div>
            <b>2. Moumita Sarkar</b>
            <p>Diagnosis - Thyroid Prediction</p>
          </div>
          <span class="badge green">13%</span>
        </div>

      </div>

      <!-- APPOINTMENT -->
      <div class="card" style="background:#98beb7;color:white;">
        <h2>Appointment</h2>

        <div class="calendar">
          <div><b>SUN</b><span>19</span></div>
          <div><b>MON</b><span>20</span></div>
          <div><b>WED</b><span>21</span></div>
        </div>

      </div>

    </div>

  </div>

</body>

</html>
